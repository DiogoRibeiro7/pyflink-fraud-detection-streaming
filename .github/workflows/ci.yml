name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run Ruff format check
        run: poetry run ruff format --check src tests scripts

      - name: Run Ruff lint
        run: poetry run ruff check src tests scripts

      - name: Run mypy
        run: poetry run mypy src

      - name: Run pytest
        run: poetry run pytest

  integration-placeholder:
    name: Optional Integration Placeholder
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Explain manual-only integration scope
        run: |
          echo "This repository keeps Kafka, Flink, Docker, and Iceberg validation out of the default CI job."
          echo "Use workflow_dispatch plus environment-specific setup if you later add heavier integration checks."
